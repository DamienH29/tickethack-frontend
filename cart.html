<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>Tickethack - Cart</title>
</head>

<body>
    <div id="header">
        <h3 id="title">Tickethack</h2>
        <h5 class="little-text">Cart</h5>
        <h5 class="little-text">Bookings</h5>
    </div>
    
    <div id="container">
            <div id="trips-waiting">
                <p class="cart-text">No tickets in your cart.</p>
                <p class="cart-text">Why not plan a trip?</p>
                <div id="total-footer">
                    <p>Total : <span id="total-amount"></span></p>
                    <button id="purchase-button">Purchase</button>
                </div>
            </div>
    </div>
    <script src="script.js" defer></script>
</body>

</html>
