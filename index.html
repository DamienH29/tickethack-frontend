<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Tickethack</title>
  </head>

  <body>
    <div id="header">
      <h3 id="title">Tickethack</h3>
      <div id="cart-booking">
        <h5 id="cart">Cart</h5>
        <h5 id="bookings">Bookings</h5>
      </div>
    </div>

    <div id="background">
      <div id="text">
        <h2>Explore the world effortlessly by train!</h2>
        <h4>
          Compare, book and enjoy cheap prices for train tickets: your journey
          starts on Tickethack.
        </h4>
      </div>

      <div id="search-container">
        <input type="text" placeholder="Departure" id="departure-input" class="input" />
        <hr>
        <input type="text" placeholder="Arrival" id="arrival-input" class="input" />
        <input type="date" value="" class="input" id="date-input" />
        <button id="search-button">Search</button>
      </div>

      <div id="response-container">
        <img src="./images/train.png" id="train" />
        <hr>
        <h4 id="no_trips_text">It's time to book your future trip.</h4>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
